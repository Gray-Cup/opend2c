zerops:
  - setup: crawler
    build:
      base: go@1

      buildCommands:
        - go get github.com/jackc/pgx/v5
        - go mod tidy
        - go build -o crawler .

      deployFiles: crawler

    run:
      base: go@1
      ports:
        - port: 8080
          httpSupport: true
      envVariables:
        # Internal Zerops URL — crawler syncs products directly to the backend, never leaving the VPC
        BACKEND_SYNC_URL: http://backend:3000/sync
        # WORKER_SECRET: set as a secret variable in the Zerops GUI
      start: ./crawler